<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Upload File</title>

    <script
        src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"
    ></script>

    <script
        src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"
    ></script>
</head>

<body>
    <h1>Upload a file</h1>

    <form
        th:action="@{/}"
        method="post"
        enctype="multipart/form-data"
        id="uploadForm"
    >
        <div>
            <label for="file">Choose a file:</label>

            <input
                type="file"
                id="file"
                name="file"
                required
            >
        </div>

        <div>
            <label for="operation">Operation:</label>

            <select
                id="operation"
                name="operation"
                required
            >
                <option value="">
                    Select an operation
                </option>

                <option value="ENCRYPTION">
                    Encryption
                </option>

                <option value="DECRYPTION">
                    Decryption
                </option>
            </select>
        </div>

        <div>
            <label for="asciiKey">Key:</label>

            <input
                type="text"
                id="asciiKey"
                name="asciiKey"
                autocomplete="off"
                required
            >

            <small>
                <span id="keyByteCount">0</span>/32 bytes
            </small>
        </div>

        <p
            id="keyError"
            role="alert"
            hidden
        >
            The key must not exceed 32 bytes.
        </p>

        <button
            type="submit"
            id="submitButton"
        >
            Upload
        </button>
    </form>

    <section aria-live="polite">
        <p id="connectionStatus">
            Connecting to server...
        </p>

        <p id="processingStatus"></p>

        <div id="downloadContainer" hidden>
            <a id="downloadLink" href="#">
                Download processed file
            </a>
        </div>
    </section>

    <p
        th:if="${message}"
        th:text="${message}"
    ></p>

    <script>
        const MAX_KEY_BYTES = 32;

        const uploadForm =
            document.getElementById("uploadForm");

        const submitButton =
            document.getElementById("submitButton");

        const keyInput =
            document.getElementById("asciiKey");

        const keyByteCount =
            document.getElementById("keyByteCount");

        const keyError =
            document.getElementById("keyError");

        const connectionStatus =
            document.getElementById("connectionStatus");

        const processingStatus =
            document.getElementById("processingStatus");

        const downloadContainer =
            document.getElementById("downloadContainer");

        const downloadLink =
            document.getElementById("downloadLink");

        const textEncoder = new TextEncoder();

        let currentEventId = null;
        let stompClient = null;

        function validateKey() {
            const byteLength = textEncoder
                .encode(keyInput.value)
                .length;

            const valid =
                byteLength > 0 &&
                byteLength <= MAX_KEY_BYTES;

            keyByteCount.textContent = byteLength;
            keyError.hidden = byteLength <= MAX_KEY_BYTES;

            keyInput.setCustomValidity(
                valid
                    ? ""
                    : "The key must contain between 1 and 32 bytes."
            );

            return valid;
        }

        function handlePictureDone(message) {
            let event;

            try {
                event = JSON.parse(message.body);
            } catch (error) {
                console.error(
                    "Invalid WebSocket message:",
                    error
                );

                return;
            }

            // Ignore notifications for other users/uploads.
            if (
                currentEventId === null ||
                event.id !== currentEventId
            ) {
                return;
            }

            if (event.status === "COMPLETED") {
                processingStatus.textContent =
                    "Processing completed.";

                downloadLink.href = event.downloadUrl;
                downloadLink.download =
                    event.name ?? "";

                downloadLink.textContent =
                    event.name
                        ? `Download ${event.name}`
                        : "Download processed file";

                downloadContainer.hidden = false;
                submitButton.disabled = false;
                return;
            }

            if (
                event.status === "CANCELLED" ||
                event.status === "FAILED"
            ) {
                processingStatus.textContent =
                    event.error
                        ? `Processing failed: ${event.error}`
                        : "Processing failed.";

                downloadContainer.hidden = true;
                submitButton.disabled = false;
            }
        }

        function connectWebSocket() {
            stompClient = new StompJs.Client({
                webSocketFactory: () =>
                    new SockJS("/ws"),

                reconnectDelay: 5000,

                heartbeatIncoming: 10000,
                heartbeatOutgoing: 10000,

                onConnect: () => {
                    connectionStatus.textContent =
                        "Connected.";

                    stompClient.subscribe(
                        "/topic/picturesDone",
                        handlePictureDone
                    );
                },

                onStompError: frame => {
                    connectionStatus.textContent =
                        "WebSocket broker error.";

                    console.error(
                        "STOMP error:",
                        frame.headers["message"],
                        frame.body
                    );
                },

                onWebSocketClose: () => {
                    connectionStatus.textContent =
                        "Connection lost. Reconnecting...";
                }
            });

            stompClient.activate();
        }

        keyInput.addEventListener(
            "input",
            validateKey
        );

        uploadForm.addEventListener(
            "submit",
            async event => {
                event.preventDefault();

                if (!validateKey()) {
                    keyInput.reportValidity();
                    return;
                }

                if (
                    stompClient === null ||
                    !stompClient.connected
                ) {
                    processingStatus.textContent =
                        "The server connection is not ready.";

                    return;
                }

                submitButton.disabled = true;
                downloadContainer.hidden = true;
                processingStatus.textContent =
                    "Uploading...";

                const formData =
                    new FormData(uploadForm);

                try {
                    const response = await fetch(
                        uploadForm.action,
                        {
                            method: "POST",
                            body: formData
                        }
                    );

                    if (!response.ok) {
                        throw new Error(
                            `Upload failed with status ${response.status}`
                        );
                    }

                    const result = await response.json();

                    if (!result.id) {
                        throw new Error(
                            "The server did not return an event ID."
                        );
                    }

                    currentEventId = result.id;

                    processingStatus.textContent =
                        "Upload received. Processing...";
                } catch (error) {
                    console.error(error);

                    processingStatus.textContent =
                        error.message;

                    submitButton.disabled = false;
                }
            }
        );

        window.addEventListener(
            "beforeunload",
            () => {
                stompClient?.deactivate();
            }
        );

        connectWebSocket();
        validateKey();
    </script>
</body>
</html>
