spring.application.name=userlayer
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=2MB

spring.kafka.bootstrap-servers:localhost:9092
spring.kafka.template.default-topic:pictures
spring.kafka.consumer.group-id:quickstart-group
spring.kafka.consumer.auto-offset-reset: latest
spring.kafka.consumer.key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer:org.springframework.kafka.support.serializer.JacksonJsonDeserializer

spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JacksonJsonDeserializer

spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.UserLayer.userlayer.models.PictureDoneEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.UserLayer.userlayer.models

spring.kafka.producer.key-serializer:org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer:org.springframework.kafka.support.serializer.JacksonJsonSerializer

